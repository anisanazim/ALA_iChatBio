<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USER QUERY -->
  <rect x="220" y="20" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#3C3489">User query</text>

  <!-- Arrow -->
  <line x1="340" y1="64" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PLANNER -->
  <rect x="180" y="102" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="122" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Planner</text>
  <text font-size="12" x="340" y="142" text-anchor="middle" dominant-baseline="central" fill="#534AB7">intent · tools · species · requires_lsid</text>

  <!-- Planner failure -->
  <line x1="500" y1="130" x2="578" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="108" width="86" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="623" y="126" text-anchor="middle" dominant-baseline="central" fill="#712B13">Ambiguous</text>
  <text font-size="12" x="623" y="142" text-anchor="middle" dominant-baseline="central" fill="#712B13">→ clarify</text>

  <!-- Arrow -->
  <line x1="340" y1="158" x2="340" y2="194" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXTRACTOR -->
  <rect x="180" y="196" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="216" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Extractor</text>
  <text font-size="12" x="340" y="236" text-anchor="middle" dominant-baseline="central" fill="#534AB7">per-intent typed schema · cleaned params</text>

  <!-- Extractor failure -->
  <line x1="500" y1="224" x2="578" y2="224" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="202" width="86" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="623" y="220" text-anchor="middle" dominant-baseline="central" fill="#712B13">Missing param</text>
  <text font-size="12" x="623" y="236" text-anchor="middle" dominant-baseline="central" fill="#712B13">→ clarify</text>

  <!-- Arrow + conditional label -->
  <line x1="340" y1="252" x2="340" y2="288" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" x="352" y="276" fill="#888780">if requires_lsid</text>

  <!-- RESOLVER -->
  <rect x="180" y="290" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="310" text-anchor="middle" dominant-baseline="central" fill="#085041">Resolver</text>
  <text font-size="12" x="340" y="330" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Redis cache · ALA namematching · LSID</text>

  <!-- Resolver failure -->
  <line x1="500" y1="318" x2="578" y2="318" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="296" width="86" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="623" y="314" text-anchor="middle" dominant-baseline="central" fill="#712B13">Not found</text>
  <text font-size="12" x="623" y="330" text-anchor="middle" dominant-baseline="central" fill="#712B13">→ ask name</text>

  <!-- Arrow -->
  <line x1="340" y1="346" x2="340" y2="382" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ROUTER -->
  <rect x="180" y="384" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="404" text-anchor="middle" dominant-baseline="central" fill="#085041">Router</text>
  <text font-size="12" x="340" y="424" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">pure Python · typed API params · Solr syntax</text>

  <!-- Router failure -->
  <line x1="500" y1="412" x2="578" y2="412" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="390" width="86" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="623" y="408" text-anchor="middle" dominant-baseline="central" fill="#712B13">No LSID</text>
  <text font-size="12" x="623" y="424" text-anchor="middle" dominant-baseline="central" fill="#712B13">→ fallback</text>

  <!-- Arrow -->
  <line x1="340" y1="440" x2="340" y2="476" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXECUTOR -->
  <rect x="180" y="478" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="498" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Executor</text>
  <text font-size="12" x="340" y="518" text-anchor="middle" dominant-baseline="central" fill="#185FA5">must-call · optional · ALA API tools</text>

  <!-- Executor failure -->
  <line x1="500" y1="506" x2="578" y2="506" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="484" width="86" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="623" y="502" text-anchor="middle" dominant-baseline="central" fill="#712B13">Tool fail</text>
  <text font-size="12" x="623" y="518" text-anchor="middle" dominant-baseline="central" fill="#712B13">→ stop/skip</text>

  <!-- Arrow -->
  <line x1="340" y1="534" x2="340" y2="570" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ALA API TOOLS -->
  <rect x="14" y="572" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" x="74" y="594" text-anchor="middle" dominant-baseline="central" fill="#444441">Occurrences</text>

  <rect x="146" y="572" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" x="196" y="594" text-anchor="middle" dominant-baseline="central" fill="#444441">Facets</text>

  <rect x="258" y="572" width="104" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" x="310" y="594" text-anchor="middle" dominant-baseline="central" fill="#444441">Taxa count</text>

  <rect x="374" y="572" width="80" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" x="414" y="594" text-anchor="middle" dominant-baseline="central" fill="#444441">BIE</text>

  <rect x="466" y="572" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" x="521" y="594" text-anchor="middle" dominant-baseline="central" fill="#444441">Distribution</text>

  <!-- Connector lines executor to tools -->
  <line x1="260" y1="572" x2="220" y2="534" stroke="#c0bfb8" stroke-width="0.5"/>
  <line x1="196" y1="572" x2="280" y2="534" stroke="#c0bfb8" stroke-width="0.5"/>
  <line x1="310" y1="572" x2="320" y2="534" stroke="#c0bfb8" stroke-width="0.5"/>
  <line x1="414" y1="572" x2="370" y2="534" stroke="#c0bfb8" stroke-width="0.5"/>
  <line x1="521" y1="572" x2="420" y2="534" stroke="#c0bfb8" stroke-width="0.5"/>

  <!-- Arrow -->
  <line x1="340" y1="616" x2="340" y2="652" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RESPONSE -->
  <rect x="220" y="654" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="676" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Artifacts + reply to user</text>

  <!-- Left side labels -->
  <text font-size="11" x="30" y="134" fill="#888780" text-anchor="middle">LLM</text>
  <text font-size="11" x="30" y="228" fill="#888780" text-anchor="middle">LLM</text>
  <text font-size="11" x="30" y="322" fill="#888780" text-anchor="middle">Async</text>
  <text font-size="11" x="30" y="416" fill="#888780" text-anchor="middle">Python</text>
  <text font-size="11" x="30" y="510" fill="#888780" text-anchor="middle">HTTP</text>

  <!-- Legend -->
  <rect x="14" y="730" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" x="34" y="741" fill="#444441">LLM stage</text>
  <rect x="110" y="730" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" x="130" y="741" fill="#444441">Logic stage</text>
  <rect x="210" y="730" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="12" x="230" y="741" fill="#444441">Execution stage</text>
  <rect x="340" y="730" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="360" y="741" fill="#444441">Failure handling</text>
</svg>
